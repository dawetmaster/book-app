name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/book-api-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/book-api-frontend

# ──────────────────────────────────────────────────────────────────────────────
# Stage 1 — LINT
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  lint-backend:
    name: "Lint · Backend (flake8 + black)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install flake8 black

      - name: flake8
        run: flake8 . --max-line-length=100 --exclude=__pycache__

      - name: black (check only)
        run: black --check --line-length=100 .

  lint-frontend:
    name: "Lint · Frontend (eslint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

# ──────────────────────────────────────────────────────────────────────────────
# Stage 2 — BUILD
# ──────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: "Build · Backend image"
    runs-on: ubuntu-latest
    needs: [lint-backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend.tar
          retention-days: 1

  build-frontend:
    name: "Build · Frontend image"
    runs-on: ubuntu-latest
    needs: [lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend.tar
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Stage 3 — TEST
# ──────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: "Test · Backend (pytest + integration)"
    runs-on: ubuntu-latest
    needs: [build-backend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookuser
          POSTGRES_PASSWORD: bookpass
          POSTGRES_DB: bookdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookuser -d bookdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bookuser:bookpass@localhost:5432/bookdb
      SECRET_KEY: ci-test-secret
      FLASK_DEBUG: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  test-frontend:
    name: "Test · Frontend (vitest)"
    runs-on: ubuntu-latest
    needs: [build-frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  scan-backend:
    name: "Scan · Trivy vulnerability scan (backend)"
    runs-on: ubuntu-latest
    needs: [build-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/backend.tar

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

# ──────────────────────────────────────────────────────────────────────────────
# Stage 4 — PUSH (only on main branch)
# ──────────────────────────────────────────────────────────────────────────────
  push-images:
    name: "Push · Images to GHCR"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, scan-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BACKEND }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_FRONTEND }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY